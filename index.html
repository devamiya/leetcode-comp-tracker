    <title>INSTA SALARIES — Real-Time Compensation Data</title>
    <meta name="description" content="Real-time salary insights from LeetCode Discuss compensation posts. See what companies are paying right now.">
    <meta name="color-scheme" content="dark light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Advanced SEO: Come to Top -->
    <link rel="canonical" href="https://leetcode-comp-tracker.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="INSTA SALARIES — Real-Time Compensation Data" />
    <meta property="og:description" content="Explore real-time software engineering salary data from LeetCode Discuss. Compare offers by company, role, and location." />
    <meta property="og:url" content="https://leetcode-comp-tracker.vercel.app/" />
    <meta property="og:site_name" content="INSTA SALARIES" />
    <meta property="og:image" content="https://leetcode-comp-tracker.vercel.app/og-image.png" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LeetCode Compensation Tracker" />
    <meta name="twitter:description" content="Software Engineering pay scales from LeetCode Discuss, parsed with AI. Transparent salary data for tech professionals." />
    
    <!-- JSON-LD Structured Data for Search Engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "INSTA SALARIES",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "description": "Real-time salary insights aggregating software engineering compensation data from LeetCode communities.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Real-time salary comparisons",
        "Company-wise compensation breakdowns",
        "Role and YOE analysis",
        "Data visualization charts"
      ]
    }
    </script>
    <script>
      (() => {
        const storedTheme = localStorage.getItem('theme');
        const systemTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme || systemTheme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
